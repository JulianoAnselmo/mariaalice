name: Atualizar Instagram Feed

on:
  schedule:
    # Roda todos os dias as 06:00 UTC (03:00 horario de Brasilia)
    - cron: '0 6 * * *'
  workflow_dispatch: # Permite rodar manualmente pelo GitHub

jobs:
  atualizar:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout do repositorio
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Instalar dependencias
        run: npm install

      - name: Rodar script de atualizacao
        run: node atualizar-instagram.js
        env:
          PUPPETEER_ARGS: '--no-sandbox --disable-setuid-sandbox'

      - name: Verificar se houve mudancas
        id: changes
        run: |
          git diff --quiet imagens/instagram/ index.html || echo "changed=true" >> $GITHUB_OUTPUT

      - name: Commit e push das imagens atualizadas
        if: steps.changes.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add imagens/instagram/ index.html instagram-posts.js
          git commit -m "Atualizar feed Instagram $(date +'%Y-%m-%d')"
          git push
